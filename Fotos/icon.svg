<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff5f9"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fondo blanco -->
  <rect width="512" height="512" fill="url(#bgGrad)" rx="80"/>

  <!-- ===== LUNA (crescent) ===== -->
  <!-- Círculo base de la luna -->
  <circle cx="358" cy="128" r="78" fill="#FDDCB0"/>
  <!-- Superposición blanca para efecto creciente -->
  <circle cx="392" cy="110" r="70" fill="url(#bgGrad)"/>
  <!-- Brillo suave interior -->
  <circle cx="338" cy="143" r="10" fill="#FFC060" opacity="0.3"/>
  <circle cx="350" cy="120" r="6" fill="#FFC060" opacity="0.25"/>
  <!-- Borde suave de la luna -->
  <circle cx="358" cy="128" r="78" fill="none" stroke="#F5A830" stroke-width="1.5" opacity="0.4"/>

  <!-- ===== ESTRELLAS ===== -->
  <g fill="#ff73b9">
    <!-- Estrella grande izquierda -->
    <polygon points="112,88 117,104 134,104 121,114 126,130 112,120 98,130 103,114 90,104 107,104" opacity="0.75"/>
    <!-- Estrellas pequeñas -->
    <circle cx="158" cy="72" r="5" opacity="0.8"/>
    <circle cx="82" cy="145" r="4" opacity="0.7"/>
    <circle cx="68" cy="105" r="3" opacity="0.6"/>
    <circle cx="420" cy="205" r="4" opacity="0.7"/>
    <circle cx="445" cy="180" r="3" opacity="0.6"/>
    <circle cx="460" cy="220" r="2.5" opacity="0.5"/>
    <circle cx="170" cy="55" r="3" opacity="0.6"/>
    <circle cx="430" cy="300" r="3" opacity="0.5"/>
    <!-- Destellos pequeños -->
    <path d="M78 75 L80 82 L87 80 L80 85 L82 92 L78 86 L74 92 L76 85 L69 80 L76 82 Z" opacity="0.6"/>
  </g>

  <!-- ===== BAILARINA (arabesco) ===== -->
  <!-- Cabeza -->
  <circle cx="198" cy="158" r="28" fill="#ff73b9"/>
  <!-- Moño / Rodete -->
  <ellipse cx="198" cy="133" rx="14" ry="11" fill="#e0569e"/>
  <circle cx="198" cy="131" r="9" fill="#ff73b9"/>
  <!-- Detalle pelo -->
  <path d="M184 148 Q198 124 212 148" fill="#e0569e" stroke="none"/>

  <!-- Cuello -->
  <rect x="192" y="184" width="12" height="16" fill="#ff73b9" rx="6"/>

  <!-- Torso -->
  <path d="M183 198 Q198 194 213 198 L210 268 Q198 276 186 268 Z" fill="#ff73b9"/>

  <!-- Brazo izquierdo levantado hacia la luna -->
  <line x1="187" y1="212" x2="140" y2="168" stroke="#ff73b9" stroke-width="17" stroke-linecap="round"/>
  <line x1="140" y1="168" x2="110" y2="138" stroke="#ff73b9" stroke-width="14" stroke-linecap="round"/>
  <!-- Mano izquierda -->
  <circle cx="104" cy="131" r="10" fill="#ff73b9"/>

  <!-- Brazo derecho extendido horizontal -->
  <line x1="210" y1="214" x2="278" y2="232" stroke="#ff73b9" stroke-width="17" stroke-linecap="round"/>
  <line x1="278" y1="232" x2="320" y2="222" stroke="#ff73b9" stroke-width="14" stroke-linecap="round"/>
  <!-- Mano derecha -->
  <circle cx="328" cy="219" r="10" fill="#ff73b9"/>

  <!-- Tutú (capas) -->
  <ellipse cx="197" cy="280" rx="75" ry="27" fill="#e0569e" opacity="0.6"/>
  <ellipse cx="197" cy="277" rx="62" ry="22" fill="#ff73b9" opacity="0.8"/>
  <ellipse cx="197" cy="274" rx="47" ry="17" fill="#ff73b9"/>
  <!-- Cintura -->
  <rect x="188" y="267" width="20" height="9" fill="#e0569e" rx="4"/>

  <!-- Pierna de apoyo (izquierda, recta hacia abajo) -->
  <line x1="192" y1="287" x2="187" y2="385" stroke="#ff73b9" stroke-width="19" stroke-linecap="round"/>
  <line x1="187" y1="385" x2="183" y2="425" stroke="#ff73b9" stroke-width="16" stroke-linecap="round"/>
  <!-- Pie de apoyo (en punta) -->
  <ellipse cx="179" cy="430" rx="18" ry="9" fill="#ff73b9" transform="rotate(-18, 179, 430)"/>

  <!-- Pierna extendida arabesco (derecha, hacia atrás y arriba) -->
  <line x1="204" y1="285" x2="272" y2="318" stroke="#ff73b9" stroke-width="19" stroke-linecap="round"/>
  <line x1="272" y1="318" x2="328" y2="298" stroke="#ff73b9" stroke-width="16" stroke-linecap="round"/>
  <!-- Pie extendido -->
  <ellipse cx="339" cy="293" rx="18" ry="9" fill="#ff73b9" transform="rotate(-22, 339, 293)"/>

  <!-- ===== DESTELLOS DECORATIVOS ===== -->
  <g fill="#FDDCB0" opacity="0.85">
    <polygon points="60,310 63,322 76,322 65,330 69,342 60,334 51,342 55,330 44,322 57,322" transform="scale(0.6) translate(40,160)"/>
    <polygon points="450,340 453,350 464,350 455,357 459,368 450,361 441,368 445,357 436,350 447,350" transform="scale(0.55)"/>
  </g>

  <!-- ===== TEXTO ===== -->
  <text x="256" y="472" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="38" fill="#ff73b9"
        font-style="italic" letter-spacing="2">Tejidos Luna</text>

  <!-- Línea decorativa bajo texto -->
  <line x1="156" y1="480" x2="356" y2="480" stroke="#ff73b9" stroke-width="1.5" opacity="0.4"/>
</svg>
